<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Mobility</title>
  <meta name="description" content="The page you are looking for does not exist. Please check the URL or return to the homepage.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; max-width: 600px; }
    .error-code { font-size: 8rem; font-weight: 700; color: #49b1f5; line-height: 1; }
    .error-message { font-size: 1.5rem; margin: 1rem 0 2rem; color: #666; }
    .search-box { display: flex; max-width: 400px; margin: 0 auto 2rem; }
    .search-box input { flex: 1; padding: 0.75rem 1rem; border: 2px solid #ddd; border-radius: 4px 0 0 4px; font-size: 1rem; outline: none; }
    .search-box input:focus { border-color: #49b1f5; }
    .search-box button { padding: 0.75rem 1.5rem; background: #49b1f5; color: #fff; border: none; border-radius: 0 4px 4px 0; font-size: 1rem; cursor: pointer; }
    .search-box button:hover { background: #3a9ee0; }
    .links a { display: inline-block; margin: 0.5rem; padding: 0.5rem 1.5rem; background: #49b1f5; color: #fff; text-decoration: none; border-radius: 4px; transition: background 0.3s; }
    .links a:hover { background: #3a9ee0; }
    .links a.secondary { background: transparent; color: #49b1f5; border: 1px solid #49b1f5; }
    .links a.secondary:hover { background: #49b1f5; color: #fff; }
    [data-theme="dark"] body { background: #1a1a2e; color: #e0e0e0; }
    [data-theme="dark"] .error-code { color: #49b1f5; }
    [data-theme="dark"] .error-message { color: #aaa; }
    [data-theme="dark"] .search-box input { background: #2a2a3e; border-color: #444; color: #e0e0e0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <p class="error-message">Sorry, the page you requested was not found</p>
    <form class="search-box" action="https://www.google.com/search" method="get">
      <input type="text" name="q" placeholder="Search articles..." autocomplete="off">
      <input type="hidden" name="sitesearch" value="lichuanyang.top/en">
      <button type="submit">Search</button>
    </form>
    <div class="links">
      <a href="/en/">Back to Home</a>
      <a href="/en/archives/" class="secondary">Archives</a>
    </div>
  </div>
</body>
</html>
